name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.1)'
        required: true
        type: string

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: pnpm install

      # The desktop now imports types from @tiki/shared (since #231), and the
      # tauri-action's beforeBuildCommand runs the desktop build standalone
      # (apps/desktop: `tsc -b && vite build`), which does NOT build the shared
      # package first. Build its dist/ here so tsc can resolve @tiki/shared.
      - name: Build shared package
        run: pnpm --filter @tiki/shared build

      - name: Sync version from tag
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          pnpm version-bump "$VERSION"
        shell: bash

      - name: Compose release body from changelog
        id: release_body
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          CHANGELOG=".tiki/releases/${TAG}-changelog.md"
          {
            echo "body<<TIKI_RELEASE_BODY_EOF"
            if [ -f "$CHANGELOG" ]; then
              cat "$CHANGELOG"
              echo ""
              echo "---"
              echo ""
              echo "**Downloads:** see the assets below for platform-specific installers."
            else
              echo "Tiki ${TAG}"
              echo ""
              echo "Per-release notes were not generated. See \`CHANGELOG.md\` in the repo root for a summary."
              echo ""
              echo "**Downloads:** see the assets below for platform-specific installers."
            fi
            echo "TIKI_RELEASE_BODY_EOF"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: 'Tiki v__VERSION__'
          releaseBody: ${{ steps.release_body.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
